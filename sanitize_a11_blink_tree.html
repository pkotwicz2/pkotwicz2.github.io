<!DOCTYPE html>
<html>
<head>
<script>
  function ShouldOutputToken(token, index, keysToOutput) {
    if (index < 2) {
      return true;
    }
    const kv = token.split('=');
    if (kv.length > 2 || kv.length == 0) {
      return false;
    }
    return keysToOutput.includes(kv[0]);
  }

  function GetValueQuoteChar(token) {
    const equalIndex = token.indexOf('=');
    if (equalIndex < 0) {
      return undefined;
    }
    if (equalIndex >= token.length - 1) {
      return undefined;
    }
    const testChar = token.at(equalIndex + 1);
    if (testChar == '\'') {
      return '\'';
    }
    if (testChar == '"') {
      return '"';
    }
    if (testChar == '(') {
      return ')';
    }
    return undefined;
  }
  
  function ProcessText() {
    const inputText = document.getElementById('inputText').value;
    const keysToOutput = ['focusable', 'ignored', 'name'];
    const toIncludeText = document.getElementById('to_include').value;
    if (toIncludeText.length > 0) {
      keysToOutput.push(toIncludeText);
    }
    const lines = inputText.split('\n');

    let result = '';
    lines.forEach((line) => {
      const tokens = line.trim().split(/\s+/);
      let tokenEndQuote = undefined;
      tokens.forEach((token, i) => {
        if (ShouldOutputToken(token, i, keysToOutput)) {
          result += token + ' ';
          tokenEndQuote = GetValueQuoteChar(token);
          if (token.trim().endsWith(tokenEndQuote)) {
            tokenEndQuote = undefined;
          }
        } else if (tokenEndQuote !== undefined) {
          result += token + ' ';
          if (token.trim().endsWith(tokenEndQuote)) {
            tokenEndQuote = undefined;
          }
        }
      });
      result += "<br>";
    });
    document.getElementById('results').innerHTML = result;
  }
</script>
<title>Text Processor</title>
</head>
<body>
  <h1>Line Processor</h1>
  <textarea id="inputText" rows=10 cols=100 placeholder="unsanitized blink accessibility tree"></textarea><br>
  Key to include in output: <input id="to_include"></input>
  <button onclick="ProcessText()">Process Text</button>
  <h2>Results:</h2>
  <div id="results"></div>
</body>
</html>
