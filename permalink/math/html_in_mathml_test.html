<html>
  <body>
    <h4>No HTML tags in MathML</h4><br/>
    <math>
      <mi>x</mi>
      <mo>=</mo>
      <mfrac>
        <mn>0</mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    <h4>Bold tag inside of MathML</h4><br/>
    <math>
      <mi><b>x</b></mi>
      <mo>=</mo>
      <mfrac>
        <mn>0</mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    <h4>Button inside of MathML</h4><br/>
    <math>
      <mtext><button>Enter answer</button></mtext>
      <mo>=</mo>
      <mfrac>
        <mn>0</mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    <h4>Select inside of MathML</h4>h4><br/>
    <math>
      <mi>x</mi>
      <mo>=</mo>
      <mfrac>
        <mn><select><option>1</option><option>2</option></select></mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    <h4>Image inside of MathML with &lt;img&gt; tag</h4><br/>
    <math>
      <mi><img src="https://dummyimage.com/16x16/0011ff/0011ff" alt="Perpendicular to surface"/>Length</mi>
      <mo>=</mo>
      <mn>2</mn>
    </math><br/>
    <h4>Image inside of MathML with glyph tag</h4><br/>
    <math>
      <semantics>
        <!-- The visible MathML token (acting as a fallback) -->
        <mi>Length perpendicular to surface</mi> 
      
        <!-- The embedded HTML Image -->
        <annotation-xml encoding="text/html">
          <img src="https://dummyimage.com/16x16/0011ff/0011ff" alt="Perpendicular to surface"/>Length
        </annotation-xml>
      </semantics>
      <mo>=</mo>
      <mn>2</mn>
    </math><br/>
  </body>
</html>
