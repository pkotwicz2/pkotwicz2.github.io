<html>
  <body>
    No HTML tags in MathML<br/>
    <math>
      <mi>x</mi>
      <mo>=</mo>
      <mfrac>
        <mn>0</mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    Bold tag inside of MathML<br/>
    <math>
      <mi><b>x</b></mi>
      <mo>=</mo>
      <mfrac>
        <mn>0</mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    Button inside of MathML<br/>
    <math>
      <mtext><button>Enter answer</button></mtext>
      <mo>=</mo>
      <mfrac>
        <mn>0</mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    Select inside of MathML<br/>
    <math>
      <mi>x</mi>
      <mo>=</mo>
      <mfrac>
        <mn><select><option>1</option><option>2</option></select></mn>
        <mn>2</mn>
      </mfrac>
    </math><br/>
    Image inside of MathML<br/>
    <math>
      <mtext><img src="https://dummyimage.com/16x16/0011ff/0011ff" alt="Perpendicular to surface"/>Length</mtext>
      <mo>=</mo>
      <mn>2</mn>
    </math><br/>
  </body>
</html>
