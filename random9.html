<html>
<head>
<style>
.translucent {
  opacity: 0.1;
}

@media (prefers-reduced-transparency) {
  .translucent {
    opacity: 1;
  }
}
</style>
</head>
<body>
<div style="background-color:purple;width:500px;height:500px">
  <div style="background-color:black;color:white" class="translucent">translucent box</div>
</div>
</body>
</html>
