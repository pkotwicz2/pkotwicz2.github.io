<!DOCTYPE html>
<body>

<div role="combobox" 
    aria-expanded="true" 
    aria-haspopup="listbox" 
    aria-controls="results-listbox">
       
<input type="text" 
    id="tag-input" 
    value="Chromium" 
    aria-autocomplete="list" 
    aria-activedescendant="option-1">
   
<ul id="results-listbox" role="listbox">
<li id="option-1" role="option" aria-selected="true">Chromium</li>
<li id="option-2" role="option">Blink</li>
</ul>
</div>
</body>
</html>
